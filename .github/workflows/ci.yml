# The OUTER GUARD for the autonomous self-maintainer: a GitHub-side check that runs the same
# gate as the orchestrator (typecheck + arch:check + tests) on every PR and push to main.
# Configured as a REQUIRED status check on main (see scripts/setup-branch-protection.sh), it
# ensures that even if the orchestrator's own in-process gates were ever weakened by a bad
# self-edit, GitHub itself refuses to merge a fix whose CI is red. The job id `ci` is the
# required-check name.
#
# sdd/security-hardening Slice 4: arch:check (the qa-engine/src src/ boundary + VCS-write-seam
# dependency-cruiser gates) was previously enforced ONLY by qa-engine/test/arch/*.test.ts's own
# node:test assertions inside `npm test` — real, but not itself run standalone in CI, so a change
# that broke `npm run arch:check` specifically (as opposed to the node:test wrapper around it)
# had no dedicated CI signal. Running it as its own step gives it an explicit, independently
# reportable status.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 to match the production orchestrator image (Dockerfile installs Node 24 over the
          # Playwright base). better-sqlite3 12.10.1's prebuilt is ABI v137 (Node 24); on Node 22 CI
          # would validate a DIFFERENT native build than ships, defeating the point of the outer guard.
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run arch:check
      - run: npm test
