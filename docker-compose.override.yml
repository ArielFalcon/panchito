# LOCAL DEV override — auto-loaded by plain `docker compose up`.
#
# It bind-mounts the host source into the orchestrator so your edits are live without a rebuild.
# Trade-off: a bind-mounted src/ is a mountpoint and the package files are bind-files, which the
# maintainer hot-swap canNOT rewrite (rmSync/cpSync → EBUSY). So with this override the self-update
# hot-swap is a deliberate no-op (it fails safe: no swap, no restart) — which is fine for dev,
# where you edit code on the host directly.
#
# For PRODUCTION (hot-swap working, code from the baked image) run WITHOUT this file:
#   docker compose -f docker-compose.yml up --build

services:
  orchestrator:
    # Reach a DEV site running on the HOST (e.g. a local docker-compose app on localhost:8080)
    # from inside the container as http://host.docker.internal:8080. The base compose pins custom
    # DNS resolvers, which suppresses Docker Desktop's automatic host.docker.internal entry, so we
    # add it explicitly. host-gateway resolves to the host on both Docker Desktop and Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Opt-in clone base for the local jhipster-store target. Defaults to github.com, so other
      # apps clone normally UNLESS you boot with GIT_REMOTE_BASE=/app/local-repos set in the host
      # env — then the orchestrator clones the bind-mounted jhipster-store for this probe session.
      GIT_REMOTE_BASE: ${GIT_REMOTE_BASE:-https://github.com}
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      # Local test target (config/apps/jhipster-store.yaml): the orchestrator clones this read-only
      # from the in-container path. Only the orchestrator clones — the agents read the working copy
      # from the shared `mirrors` volume, so they do NOT need this mount. Activate per-run with
      # GIT_REMOTE_BASE=/app/local-repos so the clone source is /app/local-repos/jhipster-store
      # (matches `repo: "jhipster-store"`). The webhook service keeps the default github.com base,
      # so portfolio/petclinic cloning is untouched.
      # Mount target ends in .git because repo-mirror clones ${GIT_REMOTE_BASE}/${repo}.git — so for
      # repo "jhipster-store" the clone source resolves to /app/local-repos/jhipster-store.git.
      - ../jhipster-store:/app/local-repos/jhipster-store.git:ro

  # The agent navigates the DEV site through its Playwright MCP during generation, so it ALSO
  # needs to reach a host-local DEV target.
  agents:
    extra_hosts:
      - "host.docker.internal:host-gateway"
