# Dos servicios de larga vida:
#   orchestrator → nuestra infra Node (webhook, gate, espejo, ejecución, reporte)
#   opencode     → el motor agéntico `opencode serve` + los MCP (serena, engram)
#
# Comparten el volumen `mirrors`: el orchestrator clona/posiciona el espejo del
# repo y el agente de OpenCode lee/escribe ahí (cwd de la sesión). Como ambos
# servicios son permanentes, la memoria (engram) y los espejos persisten.
#
# Los secretos los inyecta Doppler (`doppler run -- docker compose up`); el
# env_file .env es solo para correr en local sin Doppler.

services:
  orchestrator:
    build: .
    env_file: .env
    restart: always
    depends_on:
      - opencode
    ports:
      - "${PORT:-8080}:8080" # recibe los webhooks post-deploy
    environment:
      OPENCODE_SERVE_URL: http://opencode:4096
      MIRROR_DIR: /app/.mirrors
    volumes:
      - ./config:/app/config # config (incluye el seed config/e2e) en caliente
      - mirrors:/app/.mirrors # espejos locales (compartidos con opencode); el harness corre sobre <repo>/e2e aquí
      # La suite E2E NO se persiste en volumen: vive en git (carpeta e2e/ del repo de la app).

  opencode:
    build: ./opencode # opencode oficial + uv/JDK (Serena) + engram (ver opencode/Dockerfile)
    env_file: .env
    restart: always
    command: ["serve", "--hostname", "0.0.0.0", "--port", "4096"]
    environment:
      MIRROR_DIR: /app/.mirrors
      ENGRAM_DATA_DIR: /data
    volumes:
      - ./opencode:/root/.config/opencode # opencode.json + agentes + AGENTS.md
      - mirrors:/app/.mirrors # MISMA ruta que el orchestrator: el agente lee/escribe aquí (Serena cachea en <repo>/.serena)
      - serena-cache:/root/.cache/uv # caché de uv/Serena (evita re-descargar en cada arranque)
      - engram-data:/data # SQLite de memoria episódica (engram) — persiste entre reinicios

volumes:
  mirrors:
  serena-cache:
  engram-data:
