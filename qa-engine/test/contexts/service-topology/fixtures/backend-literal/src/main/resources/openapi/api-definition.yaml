openapi: "3.0.3"
info:
  title: Orders API (literal vs param fixture)
  version: "1.0"
paths:
  /orders/active:
    get:
      operationId: getActiveOrders
      summary: List active orders (literal path segment)
      responses:
        "200":
          description: OK
  /orders/{id}:
    get:
      operationId: getOrderById
      summary: Get order by id (param path segment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
