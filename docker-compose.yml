# Two long-lived services:
#   orchestrator → the Node infrastructure (webhook, gate, working copy, execution, reporting)
#   opencode     → the agentic engine `opencode serve` + the MCPs (serena, engram)
#
# They share the `mirrors` volume: the orchestrator clones/checks out the repo
# working copy and the OpenCode agent reads/writes there (the session cwd). Since
# both services are persistent, memory (engram) and the working copies persist.
#
# Doppler injects the secrets (`doppler run -- docker compose up`); the env_file
# .env is only for running locally without Doppler.

services:
  orchestrator:
    build: .
    env_file: .env
    restart: always
    # Explicit public resolvers: Docker's embedded DNS (127.0.0.11) forwards to the host
    # resolver, which under a VPN / split-DNS may fail to resolve external names (this caused
    # "ENOTFOUND github.com" when opening the PR). Pinning resolvers makes egress deterministic.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      opencode:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080" # receives the post-deploy webhooks
    environment:
      OPENCODE_SERVE_URL: http://opencode:4096
      MIRROR_DIR: /app/.mirrors
    volumes:
      - ./config:/app/config # config (includes the config/e2e seed), hot-reloaded
      - ./src:/app/src # source code hot-reload: maintainer fixes take effect on restart
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - mirrors:/app/.mirrors # local working copies (shared with opencode); the harness runs over <repo>/e2e here
      - qa-data:/app/data # run history (SQLite) — persists across restarts; without this it is wiped each boot
      # The E2E suite is NOT persisted in a volume: it lives in git (the app repo's e2e/ folder).

  opencode:
    build: ./opencode # official opencode + uv/JDK (Serena) + engram (see opencode/Dockerfile)
    restart: always
    # Same explicit resolvers as the orchestrator: the agent must reach the model gateway and
    # the live DEV site (Playwright MCP) regardless of host/VPN DNS quirks.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: ["serve", "--hostname", "0.0.0.0", "--port", "4096"]
    # SECURITY: the agent container does NOT get the full .env. It receives ONLY the
    # model key and the DEV credentials it needs for Playwright login — NEVER
    # GITHUB_TOKEN / WEBHOOK_SECRET / QA_API_TOKEN. Git writes are the orchestrator's
    # job, so the agent has no push credential to exfiltrate. (docker compose reads
    # ./.env for ${VAR} interpolation, so this works locally and under Doppler.)
    environment:
      MIRROR_DIR: /app/.mirrors
      ENGRAM_DATA_DIR: /data
      OPENCODE_PRINT_LOGS: "true"
      OPENCODE_LOG_LEVEL: ${OPENCODE_LOG_LEVEL:-INFO}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
      DEV_ENV_USER: ${DEV_ENV_USER:-}
      DEV_ENV_PASS: ${DEV_ENV_PASS:-}
      DEV_TEST_USER: ${DEV_TEST_USER:-}
      DEV_TEST_PASS: ${DEV_TEST_PASS:-}
    volumes:
      - ./opencode:/root/.config/opencode # opencode.json + agents + AGENTS.md + skills
      - mirrors:/app/.mirrors # SAME path as the orchestrator: the agent reads/writes here (Serena caches in <repo>/.serena)
      - serena-cache:/root/.cache/uv # uv/Serena cache (avoids re-downloading on each boot)
      - engram-data:/data # engram's episodic-memory SQLite — persists across restarts
      - opencode-data:/root/.local/share/opencode # sessions + auth — survives restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096/global/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mirrors:
  qa-data:
  serena-cache:
  engram-data:
  opencode-data:
