# LOCAL DEV override — auto-loaded by plain `docker compose up`.
#
# It bind-mounts the host source into the orchestrator so your edits are live without a rebuild.
# Trade-off: a bind-mounted src/ is a mountpoint and the package files are bind-files, which the
# maintainer hot-swap canNOT rewrite (rmSync/cpSync → EBUSY). So with this override the self-update
# hot-swap is a deliberate no-op (it fails safe: no swap, no restart) — which is fine for dev,
# where you edit code on the host directly.
#
# For PRODUCTION (hot-swap working, code from the baked image) run WITHOUT this file:
#   docker compose -f docker-compose.yml up --build

services:
  orchestrator:
    # Reach a DEV site running on the HOST (e.g. a local docker-compose app on localhost:8080)
    # from inside the container as http://host.docker.internal:8080. The base compose pins custom
    # DNS resolvers, which suppresses Docker Desktop's automatic host.docker.internal entry, so we
    # add it explicitly. host-gateway resolves to the host on both Docker Desktop and Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Legacy strangler-dispatch toggle (qa-engine's selectEngine, pipeline-engine-flag.ts).
      # Plan 7.6 cutover: the legacy engine is deleted — the qa-engine RunPipelinePort factory is
      # now the ONLY engine regardless of this value. Kept as a passthrough only so a stale
      # PIPELINE_ENGINE=legacy in an operator's env surfaces a one-time deprecation warning instead
      # of an undefined-var error; it no longer selects a different code path.
      PIPELINE_ENGINE: ${PIPELINE_ENGINE:-}
      # Agent provider override for the ORCHESTRATOR process (src/agent-runtime/config.ts honors
      # it; provider selection happens host-side, not in the agents supervisor). This environment
      # entry beats the env_file (.env) value, so the host env controls the provider per boot;
      # empty/unset falls back to the key-based default (OPENCODE_API_KEY present -> opencode).
      AGENT_SINGLE_PROVIDER: ${AGENT_SINGLE_PROVIDER:-}
      # Opt-in clone base for the local jhipster-store target. Defaults to github.com, so other
      # apps clone normally UNLESS you boot with GIT_REMOTE_BASE=/app/local-repos set in the host
      # env — then the orchestrator clones the bind-mounted jhipster-store for this probe session.
      GIT_REMOTE_BASE: ${GIT_REMOTE_BASE:-https://github.com}
      # Test-login credentials forwarded to the e2e Playwright run (scrubEnv keeps /^DEV_/). An app
      # that requires auth (jhipster-store) needs these, or the authenticate() fixture skips login
      # and every entity-page test times out. Set per-probe in the host env, e.g.
      # DEV_TEST_USER=admin DEV_TEST_PASS=admin (the JHipster default admin user).
      DEV_TEST_USER: ${DEV_TEST_USER:-}
      DEV_TEST_PASS: ${DEV_TEST_PASS:-}
      # Planner (agent repo/live-app exploration) deadline. Default 240s (4min) is tight for a large
      # SPA monorepo like jhipster-store where the agent explores the live app via Playwright-MCP;
      # raised to 600s (10min) here so a slow-but-progressing exploration is not killed mid-flight.
      OPENCODE_PLANNER_TIMEOUT_MS: ${OPENCODE_PLANNER_TIMEOUT_MS:-600000}
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      # Local test target (config/apps/jhipster-store.yaml): the orchestrator clones this read-only
      # from the in-container path. Only the orchestrator clones — the agents read the working copy
      # from the shared `mirrors` volume, so they do NOT need this mount. Activate per-run with
      # GIT_REMOTE_BASE=/app/local-repos so the clone source is /app/local-repos/jhipster-store
      # (matches `repo: "jhipster-store"`). The webhook service keeps the default github.com base,
      # so portfolio/petclinic cloning is untouched.
      # Mount target ends in .git because repo-mirror clones ${GIT_REMOTE_BASE}/${repo}.git — so for
      # repo "jhipster-store" the clone source resolves to /app/local-repos/jhipster-store.git.
      - ../jhipster-store:/app/local-repos/jhipster-store.git:ro

  # The agent navigates the DEV site through its Playwright MCP during generation, so it ALSO
  # needs to reach a host-local DEV target.
  agents:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Live-mount the supervisor so edits to agents/agent-supervisor.mjs take effect on a plain
    # `docker compose restart agents` — WITHOUT a rebuild — the same live-code trade the orchestrator
    # already gets for src/. The Dockerfile COPYs this file to /usr/local/bin at build time, so the
    # baked image can otherwise go stale relative to the source (a fix in the source never reaches the
    # running container until `docker compose build agents`). It is a single self-contained file (only
    # node builtins), so mounting just it is sufficient.
    volumes:
      - ./agents/agent-supervisor.mjs:/usr/local/bin/agent-supervisor.mjs
