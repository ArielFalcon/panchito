# Watched-app template. COPY to config/apps/<your-app>.yaml and fill it in.
# ${VARS} are expanded from the environment (.env) — do not put secrets here.

name: "example"
repo: "org/example"            # owner/repo on GitHub (Issues + E2E suite PRs)
baseBranch: "main"             # target branch for the QA pull requests

dev:
  baseUrl: "https://dev.example.internal"
  # versionUrl is OPTIONAL: a `/version` endpoint returning { sha, healthy }. The
  # pipeline waits for it (deploy gate) and uses it for health checks. OMIT it for
  # already-deployed sites with no such endpoint (e.g. a static site) → gate skipped.
  versionUrl: "https://dev.example.internal/version"
  pollIntervalMs: 10000        # how often the gate polls
  deployTimeoutMs: 600000      # 10 min for DEV to stabilize on the new SHA

qa:
  needsReview: true            # the strict reviewer validates the generated E2E tests
  shadow: false                # true = run everything but do NOT publish PRs or open Issues (initial rollout)
  testDataPrefix: "qa-bot"     # test entities namespaced per SHA

report:
  onFailure: "github-issue"
