# Servidores MCP que consume el motor. Deshabilitados en el template: mientras
# enabled=false (o sin url), el motor usa las implementaciones nulas y funciona
# igual. Habilítalos cuando los sidecars estén levantados (ver docker-compose).
# Las URLs se expanden desde el entorno (.env) — no pongas hosts internos aquí.

servers:
  codegraph:
    enabled: false
    url: "${CODEGRAPH_MCP_URL}" # contexto estructural / blast radius
  engram:
    enabled: false
    url: "${ENGRAM_MCP_URL}" # memoria episódica persistente
