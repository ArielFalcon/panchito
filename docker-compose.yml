# Two long-lived services:
#   orchestrator → the Node infrastructure (webhook, gate, working copy, execution, reporting)
#   agents       → dual agent container: supervisor + OpenCode/Codex runtimes + MCPs
#
# They share the `mirrors` volume: the orchestrator clones/checks out the repo
# working copy and the agent reads/writes there (the session cwd). Since
# both services are persistent, memory (engram) and the working copies persist.
#
# Doppler injects the secrets (`doppler run -- docker compose up`); the env_file
# .env is only for running locally without Doppler.
#
# This base file is the PRODUCTION definition: the orchestrator runs the src/ baked into the
# image (COPY in the Dockerfile), so the maintainer hot-swap (which rewrites src/ + package
# files) works on a normal filesystem. docker-compose.override.yml — auto-loaded by plain
# `docker compose up` for local dev — bind-mounts the host source for live editing; those bind
# mounts make src/ a mountpoint and the package files bind-files, which the swap canNOT rewrite
# (EBUSY), so hot-swap is intentionally a no-op in dev. For production run WITHOUT the override:
#   docker compose -f docker-compose.yml up --build

services:
  orchestrator:
    build: .
    env_file: .env
    restart: always
    # Defense-in-depth for the untrusted code the orchestrator executes (code-mode runs the
    # watched repo's own install/test command; e2e runs agent-authored specs). The orchestrator
    # DROPS PRIVILEGE for those spawns to the unprivileged `sandbox` user (uid 1001) and chowns the
    # working copy to it (src/qa/code-runner.ts → resolveSandbox), so untrusted code cannot read the
    # root-owned API token, tamper with the orchestrator's files, or write sibling repos — see
    # docs/code-mode-sandbox.md. no-new-privileges blocks the dropped child from re-acquiring root via
    # setuid. NETWORK egress restriction (the one isolation kept out-of-app so Maven/Gradle can resolve
    # deps) remains a deploy-layer control: add an egress firewall / network policy in production.
    security_opt:
      - no-new-privileges:true
    # The graceful-shutdown drain (src/index.ts) needs up to 25s to close the in-flight run;
    # Docker's default 10s grace would SIGKILL it mid-drain on every `docker stop`/redeploy.
    stop_grace_period: 35s
    # Explicit public resolvers: Docker's embedded DNS (127.0.0.11) forwards to the host
    # resolver, which under a VPN / split-DNS may fail to resolve external names (this caused
    # "ENOTFOUND github.com" when opening the PR). Pinning resolvers makes egress deterministic.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      agents:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080" # receives the post-deploy webhooks
    environment:
      OPENCODE_SERVE_URL: http://agents:4096
      AGENT_SUPERVISOR_URL: http://agents:4097
      MIRROR_DIR: /app/.mirrors
      # noble drift: the image's `sandbox` user is uid 1002 (pwuser took 1001 on Ubuntu 24.04) — keep
      # code-runner.ts (CODE_SANDBOX_UID ?? 1001) in sync with the Dockerfile so privilege-drop resolves.
      CODE_SANDBOX_UID: "1002"
    volumes:
      - ./config:/app/config # app configs + the config/e2e seed (read-mostly; not hot-swapped)
      # NOTE: src/ and package files are NOT bind-mounted here on purpose — the hot-swap must be
      # able to rewrite them (a bind mount → EBUSY). They ship baked in the image. The dev
      # override re-adds them for live editing. The E2E suite is NOT in a volume: it lives in git.
      - mirrors:/app/.mirrors # local working copies (shared with the agents container); the harness runs over <repo>/e2e here
      - qa-data:/app/data # run history + maintainer state (markers/ledger/failure memory) — persists across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  agents:
    build: ./agents # dual agent runtime: OpenCode + Codex + uv/JDK (Serena) + engram
    restart: always
    # Same explicit resolvers as the orchestrator: the agent must reach the model gateway and
    # the live DEV site (Playwright MCP) regardless of host/VPN DNS quirks.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # SECURITY: the agent container does NOT get the full .env. It receives ONLY the
    # model-provider keys and the DEV credentials it needs for Playwright login — NEVER
    # GITHUB_TOKEN / WEBHOOK_SECRET / QA_API_TOKEN. Git writes are the orchestrator's
    # job, so the agent has no push credential to exfiltrate. (docker compose reads
    # ./.env for ${VAR} interpolation, so this works locally and under Doppler.)
    environment:
      MIRROR_DIR: /app/.mirrors
      ENGRAM_DATA_DIR: /data
      AGENT_PROMPT_DIR: /root/.config/agent
      AGENT_SUPERVISOR_PORT: 4097
      AGENT_RUNTIME_MODE: ${AGENT_RUNTIME_MODE:-single}
      AGENT_SINGLE_PROVIDER: ${AGENT_SINGLE_PROVIDER:-}
      AGENT_PRIMARY_PROVIDER: ${AGENT_PRIMARY_PROVIDER:-}
      AGENT_REVIEWER_PROVIDER: ${AGENT_REVIEWER_PROVIDER:-}
      AGENT_CHAT_PROVIDER: ${AGENT_CHAT_PROVIDER:-}
      AGENT_PRIMARY_MODEL: ${AGENT_PRIMARY_MODEL:-}
      AGENT_REVIEWER_MODEL: ${AGENT_REVIEWER_MODEL:-}
      AGENT_CHAT_MODEL: ${AGENT_CHAT_MODEL:-}
      OPENCODE_PRINT_LOGS: "true"
      OPENCODE_LOG_LEVEL: ${OPENCODE_LOG_LEVEL:-INFO}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      DEV_ENV_USER: ${DEV_ENV_USER:-}
      DEV_ENV_PASS: ${DEV_ENV_PASS:-}
      DEV_TEST_USER: ${DEV_TEST_USER:-}
      DEV_TEST_PASS: ${DEV_TEST_PASS:-}
    volumes:
      - ./agents:/root/.config/opencode:ro # opencode.json + agents + AGENTS.md + skills (read-only: agents must NOT rewrite their own prompts)
      - ./agent:/root/.config/agent:ro # provider-neutral prompts/skills for Codex and future OpenCode config
      - mirrors:/app/.mirrors # SAME path as the orchestrator: the agent reads/writes here (Serena caches in <repo>/.serena)
      - serena-cache:/root/.cache/uv # uv/Serena cache (avoids re-downloading on each boot)
      - engram-data:/data # engram's episodic-memory SQLite — persists across restarts
      - opencode-data:/root/.local/share/opencode # sessions + auth — survives restarts
      - codex-data:/root/.codex # Codex auth/session state — survives restarts
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4097/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "4.0"

volumes:
  mirrors:
  qa-data:
  serena-cache:
  engram-data:
  opencode-data:
  codex-data:
