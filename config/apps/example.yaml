# Watched-app template. COPY to config/apps/<your-app>.yaml and fill it in.
# ${VARS} are expanded from the environment (.env) — do not put secrets here.

name: "example"
repo: "org/example"            # owner/repo on GitHub (Issues + E2E suite PRs)
baseBranch: "main"             # target branch for the QA pull requests

# Optional: where this repo keeps its OpenAPI/Swagger contract(s) — a glob or a list
# of globs relative to the repo root. The QA AGENT locates and reads them as authoring
# context (to write contract-aware assertions: required fields, enums, error responses);
# the orchestrator never parses them, and the agent never calls the API directly (it
# drives the app through the web UI). Omit for repos with no backend contract (e.g. a
# static frontend). Example for an Angular + Spring monorepo:
# openapi:
#   - "**/src/main/resources/openapi/*.yaml"
#   - "**/api-definition.yaml"

# code mode: set `code: true` to test source-code logic directly (run the repo's
# own test suite, classified by exit code) WITHOUT a web environment or Playwright.
# In code mode the whole `dev:` block below is omitted (there is no DEV URL).
# code: true

# Optional (e2e apps only): the microservice repos that participate in this app's
# flows. A webhook from one of these repos — sent by ITS CI/CD AFTER deploying to
# DEV (deploy-event semantics) — triggers an e2e run of THIS app with the service
# commit's diff as blast radius. versionUrl is an optional verification belt: when
# present, the gate polls it for the service SHA before testing. The agent reads
# the service's read-only working copy plus its OpenAPI to derive frontend impact
# (it never calls the service directly — flows are always driven through the UI).
# services:
#   - repo: "org/orders-svc"
#     openapi: "**/openapi/*.yaml"           # glob INSIDE the service repo
#     versionUrl: "https://dev-api.example.internal/orders/version"
#   - repo: "org/payments-svc"

# `dev` is REQUIRED for e2e apps (the default) and OMITTED for code-mode apps.
dev:
  baseUrl: "https://dev.example.internal"
  # versionUrl is OPTIONAL: a `/version` endpoint returning { sha, healthy }. The
  # pipeline waits for it (deploy gate) and uses it for health checks. OMIT it for
  # already-deployed sites with no such endpoint (e.g. a static site) → gate skipped.
  versionUrl: "https://dev.example.internal/version"
  pollIntervalMs: 10000        # how often the gate polls
  deployTimeoutMs: 600000      # 10 min for DEV to stabilize on the new SHA

qa:
  needsReview: true            # the strict reviewer validates the generated E2E tests
  shadow: false                # true = run everything but do NOT publish PRs or open Issues (initial rollout)
  testDataPrefix: "qa-bot"     # test entities namespaced per SHA
  # parallelDiff: true         # diff runs plan the blast radius and fan out parallel workers
                               # (>=2 independent objectives; falls back to single-agent
                               # otherwise). Default off; recommended for apps with services[]
                               # or commits whose blast radius spans several independent flows.
  # explorer: true             # single-agent diff runs first do a read-only "explorer" pass that
                               # distills the blast radius into a brief, so the generator gets a
                               # clean context window instead of re-exploring. Default off; adds one
                               # cheap session per run. (No effect on parallelDiff fan-out runs.)
  # Change-coverage (the value keystone): does the suite actually exercise the lines the commit
  # changed? Optional; defaults to mode "signal", minRatio 0.7.
  changeCoverage:
    mode: signal               # off | signal (measure+record only) | enforce (close the gap, block if still low)
    minRatio: 0.7              # fraction of changed lines that must be exercised to "pass"
  # Value oracle — the ground-truth that lets the learning flywheel PROMOTE rules (not just
  # accumulate them). code apps: mutation testing via Stryker (bundled in the orchestrator — no
  # repo setup needed; JS/TS only). e2e apps: response fault-injection, which RE-RUNS the suite
  # against DEV once per green diff (≈2× execution — that is the cost of ground-truth).
  # Default is shadow-aware: OFF while `shadow: true` (don't double-run DEV during onboarding),
  # ON once you go to production (`shadow: false`). Set explicitly to override — e.g. a static
  # site with no backend should set "off" (fault-injection has nothing meaningful to corrupt).
  # valueOracle: signal        # off | signal  (omit to use the shadow-aware default)

report:
  onFailure: "github-issue"
